services:
  - type: web
    name: volts-platform
    env: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: Dockerfile
    disk:
      mountPath: /data
      sizeGb: 1
    envVars:
      - key: JWT_SECRET
        value: your-secure-jwt-secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: EMAIL_FROM
        value: noreply@volts.local
      - key: SMTP_HOST
        value: smtp.example.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        value: user@example.com
      - key: SMTP_PASSWORD
        value: password
      - key: ADMIN_EMAIL
        value: admin@volts.local
      - key: ADMIN_PASSWORD
        value: Admin123!
      - key: DB_PATH
        value: /data/volts.db
    healthCheckPath: /api/stats
